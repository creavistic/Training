<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <title>Strong Smart Better Pro Trainer</title>
  <style>
    :root{
      --black:#000;
      --yellow:#fff200;
      --yellow2:#ffe600;
      --grey:#5d6978;
      --white:#fff;
      --muted:#121212;
      --line:#111;
      --danger:#ff3b30;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{margin:0;background:#000;color:#000;font-family:'Montserrat',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow-x:hidden}
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer;touch-action:manipulation}
    .app{width:100%;max-width:480px;min-height:100svh;margin:0 auto;background:var(--yellow);position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
    .top{background:#000;color:var(--yellow);padding:24px 28px 22px 0;min-height:180px;display:grid;grid-template-columns:1fr 158px;gap:8px;align-items:start}
    .brand{font-weight:900;text-transform:uppercase;line-height:.78;letter-spacing:-1.8px;font-size:43px;padding-left:0}
    .brand .small{display:block;font-size:18px;line-height:1.05;letter-spacing:.2px;margin-top:8px;text-align:center;padding-right:2px}
    .top-actions{display:flex;flex-direction:column;gap:22px;align-items:flex-end;padding-top:10px}
    .pill{width:156px;border-radius:16px;background:var(--yellow);color:#000;font-weight:800;font-size:22px;line-height:1;padding:13px 12px;box-shadow:0 0 0 2px rgba(0,0,0,.25)}
    .speaker{position:absolute;right:21px;top:157px;width:50px;height:50px;border-radius:50%;background:#000;color:var(--yellow);display:grid;place-items:center;font-size:26px;z-index:4;border:5px solid var(--yellow)}
    .speaker.off{opacity:.7}.speaker.off:after{content:'';position:absolute;width:31px;height:4px;background:var(--yellow);transform:rotate(-38deg);border-radius:4px}
    .screen{display:none}.screen.active{display:block}
    .train{padding:15px 36px 0;background:var(--yellow);min-height:650px}
    .stats{display:grid;grid-template-columns:1fr 112px 1fr;gap:10px;align-items:center;margin-bottom:18px}
    .stat{display:grid;grid-template-columns:48px 1fr;align-items:end;column-gap:6px;justify-content:center}.stat.right{grid-template-columns:48px 1fr}.stat-label{grid-column:1/3;text-align:center;font-size:21px;line-height:1;font-weight:800;margin-bottom:7px}.bubble{width:48px;height:48px;border-radius:50%;background:#000;color:var(--yellow);display:grid;place-items:center;font-size:28px;font-weight:900;line-height:1}.stat-frac{display:flex;align-items:end;font-weight:800;font-size:35px;line-height:.96;gap:3px}.stat-frac .slash{font-weight:600;font-size:38px;margin-bottom:-2px}.stat-frac .total{font-size:30px;font-weight:700}
    .mid-timer{width:112px;height:112px;border-radius:50%;background:#000;color:var(--yellow);display:grid;place-items:center;font-size:44px;font-weight:900;line-height:1;margin:0 auto;position:relative}.mid-timer:before,.mid-timer:after{content:'';position:absolute;top:16px;bottom:16px;width:3px;background:#000}.mid-timer:before{left:-24px}.mid-timer:after{right:-24px}
    .exercise-card{margin-top:2px;border:1px solid rgba(0,0,0,.08)}
    .image-wrap{width:100%;height:252px;background:#5e6a7a;display:grid;place-items:center;overflow:hidden;position:relative}.image-wrap img{width:100%;height:100%;object-fit:cover;display:block}.image-placeholder{font-size:68px;font-weight:900;letter-spacing:-2px;color:#000}.name-bar{height:48px;background:#000;color:var(--yellow);display:flex;align-items:center;justify-content:center;text-align:center;font-size:22px;font-weight:900;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:20px}.control{background:#000;color:var(--yellow);font-weight:800;font-size:15px;border-radius:12px;height:40px;padding:0 10px}.control:active,.pill:active,.speaker:active{transform:scale(.98)}
    .status{text-align:center;margin-top:26px;min-height:96px}.status h2{font-size:30px;line-height:1.08;margin:0 0 5px;font-weight:900;letter-spacing:-.6px}.status p{font-size:27px;line-height:1.05;margin:0;font-weight:800}.progress-holder{margin-top:10px;height:8px;border-radius:99px;background:rgba(0,0,0,.18);overflow:hidden}.progress{height:100%;width:0;background:#000;transition:width .2s linear}
    .bottom{background:#000;color:var(--yellow);min-height:190px;padding:10px 0 22px;margin-top:0;border-top:4px solid #000}.bottom-logo{font-weight:900;text-transform:uppercase;letter-spacing:-3px;line-height:.82;font-size:58px}.bottom-logo span{display:block}
    .panel{background:#000;min-height:100svh;color:var(--yellow);padding:24px 18px}.panel h1{font-size:36px;line-height:.95;margin:0 0 18px;font-weight:900;letter-spacing:-1px;text-transform:uppercase}.panel-card{background:var(--yellow);color:#000;border-radius:20px;padding:16px;margin-bottom:14px}.panel-card h2{margin:0 0 12px;font-size:22px;font-weight:900}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:900;text-transform:uppercase;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:3px solid #000;border-radius:12px;background:#fff;color:#000;padding:10px;font-weight:800}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.black-btn{background:#000;color:var(--yellow);font-weight:900;border-radius:14px;padding:12px 16px}.yellow-btn{background:var(--yellow);color:#000;font-weight:900;border-radius:14px;padding:12px 16px;border:3px solid #000}.danger-btn{background:#000;color:#ff6464;font-weight:900;border-radius:14px;padding:12px 16px}.exercise-edit{border:3px solid #000;border-radius:18px;padding:12px;margin-bottom:12px;background:#fff}.edit-head{display:flex;gap:10px;align-items:center}.edit-thumb{width:72px;height:58px;object-fit:cover;background:#5d6978;border-radius:10px;border:2px solid #000}.edit-title{font-size:16px;font-weight:900;line-height:1.05}.muted{font-size:12px;font-weight:700;color:#333;line-height:1.35}.poster{width:100%;border:3px solid #000;border-radius:14px;display:block}.hidden{display:none!important}
    @media(max-width:390px){.top{grid-template-columns:1fr 140px;padding-right:18px}.brand{font-size:38px}.pill{width:136px;font-size:19px}.train{padding-left:28px;padding-right:28px}.stats{grid-template-columns:1fr 96px 1fr}.mid-timer{width:96px;height:96px;font-size:38px}.mid-timer:before{left:-18px}.mid-timer:after{right:-18px}.image-wrap{height:230px}.name-bar{font-size:20px}.control{font-size:14px}.bottom-logo{font-size:52px}.status h2{font-size:27px}.status p{font-size:23px}.stat-label{font-size:19px}.stat-frac{font-size:31px}.stat-frac .total{font-size:26px}}
  </style>
</head>
<body>
  <div class="app">
    <section id="trainingScreen" class="screen active">
      <header class="top">
        <div class="brand">Strong<br>Smart<br>Better<span class="small">PRO TRAINER</span></div>
        <div class="top-actions">
          <button class="pill" id="openRoutine">Rutina</button>
          <button class="pill" id="startTraining">Entrenar</button>
        </div>
      </header>
      <button id="audioToggle" class="speaker" aria-label="Activar o desactivar audio">🔊</button>
      <main class="train">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Reps</div>
            <div class="bubble" id="currentRep">8</div>
            <div class="stat-frac"><span class="slash">/</span><span class="total" id="totalRep">10</span></div>
          </div>
          <div class="mid-timer" id="timer">44</div>
          <div class="stat right">
            <div class="stat-label">Serie</div>
            <div class="bubble" id="currentSet">2</div>
            <div class="stat-frac"><span class="slash">/</span><span class="total" id="totalSet">3</span></div>
          </div>
        </div>
        <section class="exercise-card">
          <div class="image-wrap"><img id="exerciseImage" alt="Imagen del ejercicio"><div id="placeholder" class="image-placeholder">IMAGEN</div></div>
          <div class="name-bar" id="exerciseName">Nombre Ejercicio</div>
        </section>
        <div class="controls">
          <button class="control" id="pauseResume">Continuar</button>
          <button class="control" id="nextStep">Siguiente</button>
          <button class="control" id="finishWorkout">Terminar</button>
        </div>
        <div class="status">
          <h2 id="phaseTitle">Cambio de Ejercicio</h2>
          <p id="phaseSubtitle">Prepárate</p>
          <div class="progress-holder"><div class="progress" id="progress"></div></div>
        </div>
      </main>
      <footer class="bottom"><div class="bottom-logo"><span>PRO</span><span>TRAINER</span></div></footer>
    </section>

    <section id="routineScreen" class="screen panel">
      <h1>Rutina</h1>
      <div class="panel-card">
        <h2>Ajustes generales</h2>
        <div class="grid2">
          <div class="field"><label>Preparación inicial</label><input id="prepSeconds" type="number" min="0"></div>
          <div class="field"><label>Descanso cambio ejercicio</label><input id="betweenSeconds" type="number" min="0"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Audio</label><select id="audioMode"><option value="voice">Voz + pitido</option><option value="beep">Pitido</option><option value="off">Sin audio</option></select></div>
          <div class="field"><label>Primer botón</label><select id="manualMode"><option value="pause">Pausar / Continuar</option><option value="complete">Completar serie</option></select></div>
        </div>
        <div class="row-actions"><button class="black-btn" id="saveRoutine">Guardar</button><button class="black-btn" id="addExercise">+ Ejercicio</button><button class="danger-btn" id="resetRoutine">Restaurar</button></div>
      </div>
      <div id="exerciseEditor"></div>
      <div class="row-actions"><button class="yellow-btn" id="backToTrain">Volver</button></div>
    </section>

    <section id="posterScreen" class="screen panel">
      <h1>Tabla</h1>
      <div class="panel-card"><img src="assets/poster_hombro.png" class="poster" alt="Tabla de ejercicios para el hombro"></div>
      <button class="yellow-btn" id="backFromPoster">Volver</button>
    </section>
  </div>

<script>
const $ = id => document.getElementById(id);
const defaultExercises = [
  {name:'Apoyo lateral', sets:3, reps:10, seconds:44, rest:25, img:'assets/apoyo_lateral.png', note:'Mantén el cuerpo alineado.'},
  {name:'Presión en pared', sets:3, reps:10, seconds:40, rest:25, img:'assets/presion_pared.png', note:'Presiona suave sin subir el hombro.'},
  {name:'Estabilidad con balón', sets:3, reps:10, seconds:45, rest:30, img:'assets/estabilidad_balon.png', note:'Controla tronco y escápula.'},
  {name:'Apoyo unilateral', sets:3, reps:8, seconds:35, rest:30, img:'assets/apoyo_unilateral.png', note:'Evita rotar el tronco.'}
];
let state = JSON.parse(localStorage.getItem('ssbProTrainer') || 'null') || {
  prepSeconds:10, betweenSeconds:20, audioMode:'voice', manualMode:'pause', exercises:defaultExercises
};
let sequence=[], step=-1, remaining=0, total=0, interval=null, paused=true, audioCtx=null, workoutStarted=false;
function save(){
  state.prepSeconds=+$('prepSeconds').value || 0;
  state.betweenSeconds=+$('betweenSeconds').value || 0;
  state.audioMode=$('audioMode').value;
  state.manualMode=$('manualMode').value;
  localStorage.setItem('ssbProTrainer', JSON.stringify(state));
  syncAudioIcon();
}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function renderEditor(){
  $('prepSeconds').value=state.prepSeconds; $('betweenSeconds').value=state.betweenSeconds; $('audioMode').value=state.audioMode; $('manualMode').value=state.manualMode;
  const root=$('exerciseEditor'); root.innerHTML='';
  state.exercises.forEach((ex,i)=>{
    const card=document.createElement('div'); card.className='panel-card exercise-edit';
    card.innerHTML=`
      <div class="edit-head"><img class="edit-thumb" src="${esc(ex.img)}" onerror="this.style.display='none'"><div><div class="edit-title">${i+1}. ${esc(ex.name)}</div><div class="muted">${ex.sets} series · ${ex.reps} reps · ${ex.seconds}s · descanso ${ex.rest}s</div></div></div>
      <div class="field"><label>Nombre</label><input data-k="name" value="${esc(ex.name)}"></div>
      <div class="grid2"><div class="field"><label>Series</label><input type="number" min="1" data-k="sets" value="${ex.sets}"></div><div class="field"><label>Reps</label><input type="number" min="0" data-k="reps" value="${ex.reps}"></div></div>
      <div class="grid2"><div class="field"><label>Segundos</label><input type="number" min="0" data-k="seconds" value="${ex.seconds}"></div><div class="field"><label>Descanso</label><input type="number" min="0" data-k="rest" value="${ex.rest}"></div></div>
      <div class="field"><label>Nota</label><input data-k="note" value="${esc(ex.note||'')}"></div>
      <div class="field"><label>Cambiar imagen</label><input type="file" accept="image/*" data-k="file"></div>
      <div class="row-actions"><button class="black-btn" data-act="up">↑</button><button class="black-btn" data-act="down">↓</button><button class="danger-btn" data-act="delete">Eliminar</button></div>`;
    root.appendChild(card);
    card.querySelectorAll('input[data-k]').forEach(input=>input.addEventListener('change',()=>{
      const k=input.dataset.k;
      if(k==='file'){
        const f=input.files[0]; if(!f) return;
        const r=new FileReader(); r.onload=()=>{ex.img=r.result; localStorage.setItem('ssbProTrainer', JSON.stringify(state)); renderEditor(); setIdlePreview();}; r.readAsDataURL(f); return;
      }
      ex[k]=['sets','reps','seconds','rest'].includes(k)?(+input.value||0):input.value;
      localStorage.setItem('ssbProTrainer', JSON.stringify(state)); setIdlePreview();
    }));
    card.querySelectorAll('button[data-act]').forEach(btn=>btn.onclick=()=>{
      const a=btn.dataset.act;
      if(a==='delete') state.exercises.splice(i,1);
      if(a==='up' && i>0) [state.exercises[i-1],state.exercises[i]]=[state.exercises[i],state.exercises[i-1]];
      if(a==='down' && i<state.exercises.length-1) [state.exercises[i+1],state.exercises[i]]=[state.exercises[i],state.exercises[i+1]];
      localStorage.setItem('ssbProTrainer', JSON.stringify(state)); renderEditor(); setIdlePreview();
    });
  });
}
function setIdlePreview(){
  const ex=state.exercises[0] || {name:'Nombre Ejercicio', reps:10, sets:3, seconds:44, img:''};
  $('currentRep').textContent=Math.min(8, ex.reps||0);
  $('totalRep').textContent=ex.reps||0;
  $('currentSet').textContent=Math.min(2, ex.sets||1);
  $('totalSet').textContent=ex.sets||1;
  $('timer').textContent=String(ex.seconds||44).padStart(2,'0');
  $('exerciseName').textContent=ex.name || 'Nombre Ejercicio';
  setImage(ex.img);
  $('phaseTitle').textContent='Cambio de Ejercicio';
  $('phaseSubtitle').textContent='Prepárate';
  $('progress').style.width='0%';
  $('pauseResume').textContent='Continuar';
}
function setImage(src){
  const img=$('exerciseImage'), ph=$('placeholder');
  if(!src){img.classList.add('hidden');ph.classList.remove('hidden');return;}
  img.src=src; img.onload=()=>{img.classList.remove('hidden');ph.classList.add('hidden')}; img.onerror=()=>{img.classList.add('hidden');ph.classList.remove('hidden')};
}
function buildSequence(){
  save(); const seq=[];
  if(state.prepSeconds>0) seq.push({type:'prep', title:'Preparación', subtitle:'Prepárate', seconds:state.prepSeconds});
  state.exercises.forEach((ex, idx)=>{
    for(let s=1; s<=Math.max(1, ex.sets); s++){
      seq.push({type:'work', ex, exerciseIndex:idx, set:s, seconds:+ex.seconds||0});
      if(s < ex.sets && ex.rest>0) seq.push({type:'rest', ex, set:s, seconds:+ex.rest||0});
    }
    if(idx < state.exercises.length-1 && state.betweenSeconds>0) seq.push({type:'change', title:'Cambio de Ejercicio', subtitle:'Prepárate', seconds:state.betweenSeconds});
  });
  return seq;
}
function startWorkout(){
  if(!state.exercises.length){alert('Añade al menos un ejercicio.'); return;}
  sequence=buildSequence(); step=-1; workoutStarted=true; paused=false; next(); show('trainingScreen');
}
function next(){
  clearInterval(interval); step++;
  if(step>=sequence.length){completeWorkout(); return;}
  const item=sequence[step]; total=remaining=Math.max(0, item.seconds||0); paused=false; updateWorkoutView(); announce(item);
  if(total>0){interval=setInterval(()=>{if(paused) return; remaining--; updateWorkoutView(); if([3,2,1].includes(remaining)) beep(800,70); if(remaining<=0) next();},1000)}
}
function updateWorkoutView(){
  const item=sequence[step]; if(!item) return setIdlePreview();
  const work=item.type==='work';
  const ex=work?item.ex:(item.ex || nextExerciseAfter(step) || state.exercises[0] || {});
  $('currentRep').textContent=work ? (ex.reps||0) : 0;
  $('totalRep').textContent=work ? (ex.reps||0) : (ex.reps||0);
  $('currentSet').textContent=work ? item.set : (item.set||1);
  $('totalSet').textContent=ex.sets||1;
  $('timer').textContent=String(remaining).padStart(2,'0');
  $('exerciseName').textContent=work ? ex.name : (item.type==='rest' ? `Descanso: ${ex.name}` : (ex?.name || 'Nombre Ejercicio'));
  setImage(ex.img);
  if(item.type==='work'){$('phaseTitle').textContent=ex.name; $('phaseSubtitle').textContent=ex.note || 'Controla la técnica';}
  if(item.type==='rest'){$('phaseTitle').textContent='Descanso'; $('phaseSubtitle').textContent='Respira y prepara la siguiente serie';}
  if(item.type==='prep'){$('phaseTitle').textContent='Preparación'; $('phaseSubtitle').textContent='Prepárate';}
  if(item.type==='change'){$('phaseTitle').textContent='Cambio de Ejercicio'; $('phaseSubtitle').textContent='Prepárate';}
  $('progress').style.width = total ? `${Math.max(0, Math.min(100, (total-remaining)/total*100))}%` : '0%';
  $('pauseResume').textContent = paused ? 'Continuar' : (state.manualMode==='complete' && work ? 'Completar' : 'Pausar');
}
function nextExerciseAfter(pos){for(let i=pos+1;i<sequence.length;i++){if(sequence[i].type==='work') return sequence[i].ex} return null}
function pauseResume(){
  const item=sequence[step];
  if(!workoutStarted){startWorkout(); return;}
  if(state.manualMode==='complete' && item?.type==='work'){next();return;}
  paused=!paused; updateWorkoutView();
}
function completeWorkout(){
  clearInterval(interval); workoutStarted=false; paused=true;
  $('currentRep').textContent='0'; $('totalRep').textContent='0'; $('currentSet').textContent='0'; $('totalSet').textContent='0'; $('timer').textContent='00';
  $('phaseTitle').textContent='Entrenamiento completado'; $('phaseSubtitle').textContent='Buen trabajo'; $('exerciseName').textContent='Finalizado'; $('progress').style.width='100%';
  speak('Entrenamiento completado'); beep(950,160);
}
function finish(){clearInterval(interval); workoutStarted=false; paused=true; setIdlePreview();}
function syncAudioIcon(){const off=state.audioMode==='off'; $('audioToggle').classList.toggle('off',off); $('audioToggle').textContent=off?'🔇':'🔊'}
function speak(text){if(state.audioMode!=='voice' || !('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='es-ES'; u.rate=.98; speechSynthesis.speak(u)}
function beep(freq=600,dur=100){if(state.audioMode==='off') return; try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.18,audioCtx.currentTime+.01); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur/1000); o.start(); o.stop(audioCtx.currentTime+dur/1000+.02)}catch(e){}}
function announce(item){if(item.type==='work') speak(`${item.ex.name}. Serie ${item.set} de ${item.ex.sets}. ${item.ex.reps} repeticiones.`); else speak(item.title || 'Descanso'); beep(650,110)}
$('openRoutine').onclick=()=>{renderEditor(); show('routineScreen')};
$('startTraining').onclick=startWorkout;
$('pauseResume').onclick=pauseResume;
$('nextStep').onclick=next;
$('finishWorkout').onclick=finish;
$('backToTrain').onclick=()=>{save(); renderEditor(); setIdlePreview(); show('trainingScreen')};
$('saveRoutine').onclick=()=>{save(); renderEditor(); setIdlePreview(); show('trainingScreen')};
$('addExercise').onclick=()=>{state.exercises.push({name:'Nuevo ejercicio',sets:3,reps:10,seconds:40,rest:25,img:'assets/poster_hombro.png',note:''});localStorage.setItem('ssbProTrainer',JSON.stringify(state));renderEditor()};
$('resetRoutine').onclick=()=>{if(confirm('¿Restaurar la rutina original?')){state.exercises=JSON.parse(JSON.stringify(defaultExercises));localStorage.setItem('ssbProTrainer',JSON.stringify(state));renderEditor();setIdlePreview()}};
$('audioToggle').onclick=()=>{state.audioMode=state.audioMode==='off'?'voice':'off';localStorage.setItem('ssbProTrainer',JSON.stringify(state));syncAudioIcon();renderEditor()};
$('backFromPoster').onclick=()=>show('trainingScreen');
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
syncAudioIcon(); renderEditor(); setIdlePreview();
</script>
</body>
</html>
